<html>
  <head>
    <meta charset="UTF8">
    <style>
      .egg{
        transform: scale(0.5);
        position:fixed;
        top:-100px;
        left:-400px;
      }
      .up{
        transform: scale(0.5);
        position:fixed;
        top:-100px;
        left:-400px;
        display:none;
      }
      .down{
        transform: scale(0.5);
        position:fixed;
        top:-100px;
        left:-400px;
        display:none;
      }
      .text1{
        position:fixed;
        top:350px;
        left:625px;
      }
      .job{
        transform: scale(1/100);
        position:fixed;
        top:78px;
        left:190px;
        display:none;
      }
      .text2{
        position:fixed;
        top:500px;
        left:480px;
        display:none;
      }
    </style>
  </head>
  <body>
   <div id="eggs">
    <img src="./up.png" class="up" id="up">
    <img src="./down.png" class="down" id="down">
    <img src="./egg.png" class="egg" id="egg">
    <img src="./job_programmer.png" class="job" id="job">
    <p class="text1" id="text1">click me!!</p>
    <h1 class="text2" id="text2">my dream is<br>programmer</h1>
   </div>
    <script>
      const egg=document.getElementById("egg");
      const up=document.getElementById("up");
      const down=document.getElementById("down");
      const job=document.getElementById("job");
      const text1=document.getElementById("text1");
      const text2=document.getElementById("text2");
      
      
       let scale = 1;
    let growing = true;

    setInterval(() => {
      if (growing) {
        scale *= 1.05;
        if (scale > 1.5) growing = false;
      } else {
        scale /= 1.05;
        if (scale < 1.0) growing = true;
      }
      text1.style.fontSize=scale*20+"px";
    }, 100);
      
      let pushcount=0;
      let moved=0;
      let moved2=0;
      const fn=function(){
       if(pushcount==0){
         egg.style.visibility="hidden";
         up.style.display="inline";
         down.style.display="inline";
         pushcount++;
       }else if(pushcount==1){
         text1.style.display="none";
         job.style.transform = `scale(${moved2/100})`;
         job.style.display="inline";
         setInterval(() => {
           moved++;
           moved2=Math.min(moved,50);
           if(moved2%2==0){
             text2.style.display="inline";
           }else{
             text2.style.display="none";
           }
           job.style.transform = `scale(${moved2/100})`;
           up.style.top = (-100 - moved) + "px";
           down.style.top = (-100 + moved) + "px";

    
         }, 100);
       }
     };
     eggs.addEventListener('click',fn);
      
      window.addEventListener('resize', () => {
  });
      
    </script>
  </body>
</html>
